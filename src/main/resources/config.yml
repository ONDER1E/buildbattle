# BuildBattle Configuration
# ----------------------------

# Duration of the building phase in minutes.
game_timer: 15

# Size of each plot in chunks (10 chunks = 160x160 blocks).
plot_size: 10

# Width of the iron-block buffer wall on each side, in chunks.
buffer_size: 2

# Duration of the theme voting phase in seconds.
word_selection_timer: 30

# Duration of the voting phase per build in seconds.
voting_timer: 30

# Minimum players required before the game can start.
min_players: 2

# to the lobby. Players will see a visible countdown in chat.
lobby_return_timer: 30

lobbyPvP: false

# Theme pool - 3 random themes are picked each round for players to vote on.
# Use /addword and /removeword to manage this list in-game (auto-saves here).
