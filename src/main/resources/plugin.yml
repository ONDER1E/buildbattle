name: BuildBattle
version: '${project.version}'
main: dev.onder1e.buildbattle.BuildBattle
api-version: '1.20'
depend:
  - FastAsyncWorldEdit
  - WorldGuard
  - ProtocolLib

description: A production-ready Build Battle plugin
authors: [ ak ]

commands:
  # ── Player commands ──────────────────────────────────────────────────────────
  ready:
    description: Toggle your ready state in the lobby.
    usage: /ready
    permission: buildbattle.play
  choose:
    description: Vote for a theme during WORD_SELECTION.
    usage: /choose <1|2|3|name>
    permission: buildbattle.play
  done:
    description: Mark your build as done and enter spectator mode.
    usage: /done
    permission: buildbattle.play
  vote:
    description: Score the current build during voting (1-10).
    usage: /vote <1-10>
    permission: buildbattle.play
  setplotblock:
    description: Change your plot floor block during building.
    usage: /setplotblock <material>
    permission: buildbattle.play
  pvpready:
    description: Get equipment for lobby PvP.
    usage: /pvpready
    permission: buildbattle.play

  # ── Admin commands ───────────────────────────────────────────────────────────
  force_start:
    description: Force start the game.
    usage: /force_start
    permission: buildbattle.admin
  force_choose:
    description: Force a specific theme.
    usage: /force_choose <theme>
    permission: buildbattle.admin
  force_end:
    description: Force end the current phase early.
    usage: /force_end
    permission: buildbattle.admin
  pause:
    description: Pause the current phase countdown.
    usage: /pause
    permission: buildbattle.admin
  resume:
    description: Resume a paused countdown.
    usage: /resume
    permission: buildbattle.admin
  config:
    description: Live-edit config values.
    usage: /config <key> <value>
    permission: buildbattle.admin
  addword:
    description: Add a theme to the pool.
    usage: /addword <word>
    permission: buildbattle.admin
  removeword:
    description: Remove a theme from the pool.
    usage: /removeword <word>
    permission: buildbattle.admin
  safe_erase_plots:
    description: Emergency block-by-block plot wipe. Use if normal cleanup fails.
    usage: /safe_erase_plots
    permission: buildbattle.admin


permissions:
  buildbattle.play:
    description: Allows a player to use all standard game commands.
    default: true
  buildbattle.admin:
    description: Grants access to all admin/override commands.
    default: op
